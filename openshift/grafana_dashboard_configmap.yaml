apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postgres-query-top10
  namespace: ${NAMESPACE}
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: postgres-dashboards
data:
  postgres-query-top10.json: |
    {
      "title": "Postgres Query Top 10",
      "uid": "postgres-query-top10",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "tags": ["postgres", "phase2"],
      "panels": [
        {
          "id": 1,
          "type": "bargauge",
          "title": "Top 10 Queries by Mean Exec Time",
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"refId": "A", "expr": "topk(10, pg_stat_statements_mean_exec_time)", "legendFormat": "{{queryid}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "ms"}, "overrides": []}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Top 10 Queries by Calls",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 9},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"refId": "A", "expr": "topk(10, pg_stat_statements_calls)", "legendFormat": "{{queryid}}"}
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Top 10 Queries by Shared Blocks Read",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"refId": "A", "expr": "topk(10, pg_stat_statements_shared_blks_read)", "legendFormat": "{{queryid}}"}
          ]
        }
      ]
    }
