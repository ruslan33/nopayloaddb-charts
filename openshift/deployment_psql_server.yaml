# Deploy with:
#   INSTANCE_NAME=kek-psql NAMESPACE=belle2-cdb \
#     POSTGRESQL_DATABASE=mydb POSTGRESQL_USER=myuser POSTGRESQL_PASSWORD=mypass \
#     envsubst < openshift/deployment_psql_server.yaml | kubectl apply -f -
#
# For persistent storage, uncomment the PVC block below and add PVC_NAME:
#   INSTANCE_NAME=kek-psql NAMESPACE=belle2-cdb PVC_NAME=my-pvc \
#     POSTGRESQL_DATABASE=mydb POSTGRESQL_USER=myuser POSTGRESQL_PASSWORD=mypass \
#     envsubst < openshift/deployment_psql_server.yaml | kubectl apply -f -
---
apiVersion: v1
kind: Service
metadata:
  name: b2testpsql-primary-headless
  namespace: ${NAMESPACE}
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: b2testpsql-primary
---
apiVersion: v1
kind: Service
metadata:
  name: b2testpsql-primary
  namespace: ${NAMESPACE}
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: b2testpsql-primary
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${INSTANCE_NAME}
  namespace: ${NAMESPACE}
spec:
  serviceName: b2testpsql-primary-headless
  replicas: 1
  selector:
    matchLabels:
      app: b2testpsql-primary
  template:
    metadata:
      labels:
        app: b2testpsql-primary
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ${INSTANCE_NAME}
          image: registry.redhat.io/rhel9/postgresql-15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRESQL_DATABASE
              value: "${POSTGRESQL_DATABASE}"
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: password
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
