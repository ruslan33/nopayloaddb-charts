kind: ConfigMap
apiVersion: v1
metadata:
  name: promtail-config
  namespace: ${NAMESPACE}
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.${NAMESPACE}.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: default

    scrape_configs:
      - job_name: django-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: django
              __path__: /var/log/gunicorn.log
      - job_name: nginx-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: nginx
              __path__: /var/log/nginx/*.access.log
      - job_name: postgres-slow-queries
        static_configs:
          - targets:
              - localhost
            labels:
              job: postgres
              __path__: /var/log/postgresql/*.log
        pipeline_stages:
          - regex:
              expression: 'duration: (?P<duration_ms>[\\d.]+) ms'
          - labels:
              duration_ms:
