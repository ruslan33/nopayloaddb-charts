apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-unified-conf
  namespace: <project>
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main_with_cache '$remote_addr - $remote_user [$time_local] '
                                    '"$request" $status $body_bytes_sent '
                                    '"$http_referer" "$http_user_agent" '
                                    '$upstream_cache_status';

        access_log /dev/stdout main_with_cache;
        error_log /dev/stderr warn;

        # Shared Cache Configuration
        proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:50m max_size=500m inactive=1h use_temp_path=off;

        # API Upstreams
        upstream java {
            server java.<project>.svc.cluster.local:8080 max_conns=150;
        }

        upstream java-replica {
            server java.<project>.svc.cluster.local:8080 weight=80 max_conns=120;
            server java-replica.<project>.svc.cluster.local:8080 weight=20 max_conns=100;
        }

        client_max_body_size 100M;

        server {
            listen 8080;
            server_name <appname>.apps.<okdcluster>;

            proxy_hide_header Cache-Control;
            add_header Cache-Control "<nginx_cache_control_value>";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_cache my_cache;
            proxy_ignore_headers "Cache-Control" "Expires";

            proxy_read_timeout 1800;
            proxy_connect_timeout 1800;
            proxy_send_timeout 1800;

            # --- Metadata API ---
            location /b2s/rest/v2/globalTagStatus {
                proxy_pass http://java;
                proxy_cache_valid 200 302 10h;
            }

            location /b2s/rest/v2/globalTags {
                proxy_pass http://java;
                proxy_cache_valid 200 302 600s;
            }

            location /b2s/rest/v2/iovPayloads {
                proxy_pass http://java-replica;
                proxy_cache_valid 200 302 300s;
            }

            location /b2s/rest {
                proxy_pass http://java;
                proxy_cache_valid 200 302 60s;
            }

            # --- Payload Files ---
            location /dbstore {
                root /usr/share/nginx/html;
                limit_except GET HEAD {
                    deny all;
                }
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-unified
  namespace: <project>
  labels:
    app: nginx-unified
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-unified
  template:
    metadata:
      labels:
        app: nginx-unified
    spec:
      securityContext:
        runAsUser: 101
        fsGroup: 1000860000
      volumes:
        - name: files-volume
          persistentVolumeClaim:
            claimName: <pvc_payload_server>
        - name: nginx-conf-volume
          configMap:
            name: nginx-unified-conf
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-pid
          emptyDir: {}
      containers:
        - name: nginx
          image: <nginx_docker_image>
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: files-volume
              mountPath: /usr/share/nginx/html
              subPath: <subPath>
            - name: nginx-conf-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-pid
              mountPath: /var/run
          imagePullPolicy: IfNotPresent
---
kind: Service
apiVersion: v1
metadata:
  name: nginx-unified
  namespace: <project>
spec:
  selector:
    app: nginx-unified
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: nginx-unified
  namespace: <project>
  annotations:
    haproxy.router.openshift.io/disable_cookies: "true"
spec:
  host: <appname>.apps.<okdcluster>
  to:
    kind: Service
    name: nginx-unified
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Allow
