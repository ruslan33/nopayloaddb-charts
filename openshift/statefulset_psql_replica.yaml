apiVersion: v1
kind: Service
metadata:
  name: b2testpsql-replica-headless
  namespace: ${NAMESPACE}
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
    - port: 9187
      targetPort: 9187
      name: metrics
  selector:
    app: b2testpsql-replica
---
apiVersion: v1
kind: Service
metadata:
  name: b2testpsql-replica
  namespace: ${NAMESPACE}
  labels:
    metrics-target: postgres
    postgres-role: replica
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
    - port: 9187
      targetPort: 9187
      name: metrics
  selector:
    app: b2testpsql-replica
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: b2testpsql-replica
  namespace: ${NAMESPACE}
spec:
  serviceName: b2testpsql-replica-headless
  replicas: 1
  selector:
    matchLabels:
      app: b2testpsql-replica
  template:
    metadata:
      labels:
        app: b2testpsql-replica
    spec:
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: postgres-logs
          emptyDir: {}
        - name: promtail-config
          configMap:
            name: promtail-config
      initContainers:
        - name: seed-from-primary
          image: postgres:15
          command:
            - /bin/bash
            - -ec
            - |
              if [ -s /var/lib/pgsql/data/PG_VERSION ]; then
                exit 0
              fi
              rm -rf /var/lib/pgsql/data/*
              PGPASSWORD="${POSTGRESQL_PASSWORD}" pg_basebackup \
                -h b2testpsql-primary.${NAMESPACE}.svc.cluster.local \
                -U "${POSTGRESQL_USER}" \
                -D /var/lib/pgsql/data \
                --wal-method=stream \
                --checkpoint=fast
              touch /var/lib/pgsql/data/standby.signal
              chmod 700 /var/lib/pgsql/data
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
      containers:
        - name: postgres
          image: postgres:15
          args:
            - "-c"
            - "log_min_duration_statement=500"
            - "-c"
            - "logging_collector=on"
            - "-c"
            - "log_directory=/var/log/postgresql"
            - "-c"
            - "log_filename=postgresql-%Y-%m-%d.log"
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRESQL_DATABASE
              value: conditions
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: password
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
            - name: postgres-logs
              mountPath: /var/log/postgresql
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-exporter-dsn
                  key: dsn
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - "-config.file=/etc/promtail/promtail-config.yaml"
          volumeMounts:
            - name: postgres-logs
              mountPath: /var/log/postgresql
            - name: promtail-config
              mountPath: /etc/promtail
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
