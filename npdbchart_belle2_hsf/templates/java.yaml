{{- if .Values.use_java }}
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: {{ include "npdbchart.fullname" . }}-java
  labels:
    {{- include "npdbchart.labels" . | nindent 4 }}
    app.kubernetes.io/component: java
spec:
  lookupPolicy:
    local: true
  tags:
    - name: {{ .Values.java_docker_image | splitList ":" | last | quote }}
      from:
        kind: DockerImage
        name: {{ .Values.java_docker_image }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "npdbchart.fullname" . }}-java
  labels:
    {{- include "npdbchart.labels" . | nindent 4 }}
    app.kubernetes.io/component: java
spec:
  replicas: 5
  selector:
    matchLabels:
      {{- include "npdbchart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: java
  template:
    metadata:
      labels:
        {{- include "npdbchart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: java
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - {{ .Values.exclude_node }}
      securityContext:
        runAsUser: 50001
        runAsGroup: 50001
        fsGroup: 50001
      containers:
      - name: java
        image: "image-registry.openshift-image-registry.svc:5000/{{ .Values.project }}/{{ include "npdbchart.fullname" . }}-java:{{ .Values.java_docker_image | splitList ":" | last }}"
        imagePullPolicy: "IfNotPresent"
        ports:
        - containerPort: 8080
          protocol: TCP
        readinessProbe:
          exec:
            command:
              - echo
              - ready
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 1
        env:
        - name: PGSERVER
          value: {{ .Values.dbhost_w }}
        - name: PGPORT
          value: "5432"
        - name: B2S_APP_LOGGING_LEVEL
          value: INFO
        - name: B2S_SERVER_LOGGING_LEVEL
          value: FINEST
        - name: B2S_HAS_EXTERNAL_SERVICE_CACHE
          value: "false"
        - name: B2S_RESOURCE_CACHE_ENABLED
          value: "false"
        - name: B2S_JWT_AUTH
          value: "true"
        - name: B2S_AUTH_SECRET
          value: {{ .Values.jwt_secret | quote }}
        - name: B2S_SERVICES_PORT
          value: "8080"
        - name: B2S_SWAGGER_HOST_PORT
          value: "8081"
        - name: B2S_QUERY_CACHE_MAX_SIZE
          value: "100"
        - name: B2S_INITIAL_MEM
          value: "2048"
        - name: B2S_MAX_MEM
          value: "5096"
        - name: B2S_PAYLOAD_SERVER
          value: {{ .Values.payload_server_alias }}
        - name: B2S_PAYLOAD_SERVER_SECURE
          value: "true"
        - name: B2S_PAYLOAD_SERVER_ROOT_PATH
          value: "/srv"
        volumeMounts:
        - mountPath: /srv
          name: payloadfs
          subPath: {{ .Values.subPath }}
        resources:
          requests:
            cpu: "4"
            ephemeral-storage: "200Mi"
      volumes:
        - name: payloadfs
          persistentVolumeClaim:
            claimName: {{ .Values.pvc_payload_server }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "npdbchart.fullname" . }}-java-replica
