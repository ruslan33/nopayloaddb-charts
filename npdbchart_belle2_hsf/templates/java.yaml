---
kind: Service
apiVersion: v1
metadata:
  name: {{ include "npdbchart.fullname" . }}-java
  labels:
    {{- include "npdbchart.labels" . | nindent 4 }}
    app.kubernetes.io/component: java
spec:
  selector:
    {{- include "npdbchart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: java
  ports:
    - name: "tcp-8080"
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
kind: Service
apiVersion: v1
metadata:
  name: {{ include "npdbchart.fullname" . }}-java-replica
  labels:
    {{- include "npdbchart.labels" . | nindent 4 }}
